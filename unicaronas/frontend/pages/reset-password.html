<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha - UniCaronas</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="shortcut icon" href="../img/icon.png" type="image/png">
  <style>
    .password-wrapper { position: relative; }
    .toggle-password {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      cursor: pointer; color: var(--text-3); display: flex; align-items: center;
    }
    .strength-meter {
      height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden;
    }
    .strength-bar { height: 100%; width: 0; transition: all 0.3s; }
    .strength-text { font-size: 0.75rem; margin-top: 4px; font-weight: 600; }
    
    .strength-weak { background: var(--red); width: 33%; }
    .strength-medium { background: var(--amber); width: 66%; }
    .strength-strong { background: var(--green); width: 100%; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="navbar-brand-wrap">
        <div class="navbar-brand-img"></div>
        <div class="navbar-brand-text">Uni<span>Caronas</span></div>
      </a>
    </div>
  </nav>

  <main class="container">
    <div style="max-width: 450px; margin: 4rem auto;">
      <div id="reset-card" class="card fade-up">
        <div class="card-title">Segurança</div>
        <h2 style="margin-bottom: 1rem;">Nova Senha</h2>
        <p class="text-muted mb-2">Crie uma senha forte para proteger sua conta.</p>
        
        <div id="alert-container"></div>

        <form id="reset-form">
          <div class="form-group">
            <label class="form-label">Nova Senha</label>
            <div class="password-wrapper">
              <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
              <span class="toggle-password" onclick="toggleVisibility('password')">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </span>
            </div>
            <div class="strength-meter"><div id="strength-bar" class="strength-bar"></div></div>
            <div id="strength-text" class="strength-text text-muted">Força da senha</div>
          </div>

          <div class="form-group">
            <label class="form-label">Confirmar Nova Senha</label>
            <div class="password-wrapper">
              <input type="password" id="confirm-password" class="form-control" placeholder="Repita a senha" required>
              <span class="toggle-password" onclick="toggleVisibility('confirm-password')">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </span>
            </div>
          </div>

          <button type="submit" id="btn-submit" class="btn btn-primary btn-full mt-1">
            Redefinir Senha
          </button>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-logo">Uni<span>Caronas</span></div>
      <div class="footer-copyright">&copy; 2026 UniCaronas. Todos os direitos reservados.</div>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script>
    const form = document.getElementById('reset-form');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm-password');
    const strengthBar = document.getElementById('strength-bar');
    const strengthText = document.getElementById('strength-text');
    const btn = document.getElementById('btn-submit');

    // Extrair dados da URL
    const token = getParam('token');
    const email = getParam('email');

    if (!token || !email) {
      showAlert('Link de recuperação inválido ou incompleto.', 'error');
      form.style.display = 'none';
    }

    // Alternar visibilidade da senha
    function toggleVisibility(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // Indicador de força
    passwordInput.addEventListener('input', () => {
      const val = passwordInput.value;
      let strength = 0;
      
      if (val.length >= 8) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val) || /[^A-Za-z0-9]/.test(val)) strength++;

      strengthBar.className = 'strength-bar';
      if (val.length === 0) {
        strengthText.textContent = 'Força da senha';
      } else if (strength <= 1) {
        strengthBar.classList.add('strength-weak');
        strengthText.textContent = 'Senha fraca';
        strengthText.style.color = 'var(--red)';
      } else if (strength === 2) {
        strengthBar.classList.add('strength-medium');
        strengthText.textContent = 'Senha razoável';
        strengthText.style.color = 'var(--amber)';
      } else {
        strengthBar.classList.add('strength-strong');
        strengthText.textContent = 'Senha forte';
        strengthText.style.color = 'var(--green)';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (passwordInput.value !== confirmInput.value) {
        return showAlert('As senhas não coincidem.', 'error');
      }

      if (passwordInput.value.length < 8) {
        return showAlert('A senha deve ter no mínimo 8 caracteres.', 'error');
      }

      btn.disabled = true;
      btn.textContent = 'Processando...';

      try {
        const res = await api.redefinirSenha({
          email,
          token,
          novaSenha: passwordInput.value
        });

        // Sucesso
        document.getElementById('reset-card').innerHTML = `
          <div class="text-center" style="padding: 1rem 0;">
            <div style="background: var(--green-dim); color: var(--green); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2 style="margin-bottom: 0.5rem;">Sucesso!</h2>
            <p class="text-muted mb-3">${res.data.message}</p>
            <a href="login.html" class="btn btn-primary btn-full">Fazer Login</a>
          </div>
        `;

      } catch (err) {
        showAlert(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Redefinir Senha';
      }
    });
  </script>
</body>
</html>
