<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erros Reportados — UniCaronas Admin</title>
  <link rel="icon" type="image/png" href="../img/icon.png?v=2">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="../js/theme.js"></script>
  <style>
    .error-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .error-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .error-user { font-size: 0.85rem; color: var(--text-3); }
    .error-date { font-size: 0.75rem; color: var(--text-3); }
    .error-desc { 
      background: var(--bg-2); 
      padding: 1rem; 
      border-radius: var(--radius-sm); 
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 1rem;
      white-space: pre-wrap;
    }
    .status-badge {
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-pendente { background: #fef3c7; color: #92400e; }
    .status-analise { background: #dbeafe; color: #1e40af; }
    .status-resolvido { background: #dcfce7; color: #166534; }

    .error-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container">
    <div id="alert-container"></div>

    <div style="margin-bottom: 2rem;">
      <h1 style="font-size: 1.5rem; font-weight: 700;">Relatórios de Erros</h1>
      <p style="color: var(--text-3); font-size: 0.9rem;">Problemas técnicos reportados pelos usuários</p>
    </div>

    <div id="lista-erros">
      <div style="text-align: center; padding: 3rem;">Carregando relatórios...</div>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!protegerRota()) return;
      const user = getUser();
      if (!user.is_admin) { window.location.href = 'dashboard.html'; return; }
      
      // Se precisa resetar senha, manda para a página admin principal que tem o modal
      if (user.forcar_reset) {
        window.location.href = 'admin.html';
        return;
      }

      await carregarErros();
    });

    async function carregarErros() {
      const container = document.getElementById('lista-erros');
      try {
        const res = await api.adminListarErros();
        
        if (res.data.length === 0) {
          container.innerHTML = '<div style="text-align:center; padding:3rem; color:var(--text-3); border:2px dashed var(--border); border-radius:1rem;">Nenhum erro reportado ainda. ✨</div>';
          return;
        }

        container.innerHTML = res.data.map(e => `
          <div class="error-card">
            <div class="error-header">
              <div>
                <span class="status-badge status-${e.status.replace('_', '')}">${e.status.replace('_', ' ')}</span>
                <div class="error-user" style="margin-top:0.5rem">
                  <strong>${e.usuario_nome || 'Anônimo'}</strong> (${e.usuario_email || 'sem e-mail'})
                </div>
              </div>
              <span class="error-date">${formatarData(e.criado_em)}</span>
            </div>
            
            <div class="error-desc">${e.descricao}</div>
            
            <div class="error-actions">
              <span style="font-size: 0.75rem; color: var(--text-3)">Mudar status:</span>
              <button class="btn btn-sm ${e.status === 'pendente' ? 'btn-primary' : 'btn-outline'}" onclick="mudarStatus(${e.id}, 'pendente')">Pendente</button>
              <button class="btn btn-sm ${e.status === 'em_analise' ? 'btn-primary' : 'btn-outline'}" onclick="mudarStatus(${e.id}, 'em_analise')">Em Análise</button>
              <button class="btn btn-sm ${e.status === 'resolvido' ? 'btn-primary' : 'btn-outline'}" onclick="mudarStatus(${e.id}, 'resolvido')">Resolvido</button>
            </div>
          </div>
        `).join('');

      } catch (err) {
        showAlert(err.message, 'error');
      }
    }

    async function mudarStatus(id, status) {
      try {
        await api.adminAtualizarErro(id, status);
        showAlert('Status atualizado!');
        carregarErros();
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }
  </script>
</body>
</html>
