<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCaronas — Detalhes da carona</title>
  <link rel="icon" type="image/png" href="../img/icon.png?v=2">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/theme.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .detalhe-layout {
      display: grid; grid-template-columns: 1fr 400px;
      gap: 3rem; padding-bottom: 3rem; align-items: start;
    }
    .detalhe-rota {
      font-size: 1.3rem; font-weight: 700;
      letter-spacing: -.4px; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }
    .rota-arrow { color: var(--accent); font-size: 1rem; font-weight: 300; }
    .preco-destaque {
      font-size: 2.5rem; font-weight: 700;
      color: var(--text); font-variant-numeric: tabular-nums;
    }
    
    /* Estilos Sprint 5 */
    .badge-mulheres {
      background: #fdf2ff;
      color: #9c27b0;
      border: 1px solid #e1bee7;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
    }
    .carona-mulheres-tema {
      border-left: 5px solid #9c27b0 !important;
    }
    .btn-espera {
      background: #ebf8ff;
      color: #2b6cb0;
      border: 1px solid #bee3f8;
      font-weight: 700;
    }
    .btn-espera:hover {
      background: #bee3f8;
      color: #2c5282;
    }

    .btn-chat-iniciar {
      display: inline-flex; align-items: center; gap: .4rem;
      background: var(--green-dim); color: var(--green);
      border: 1px solid rgba(34,211,160,.25);
      padding: .4rem .9rem; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .btn-chat-iniciar:hover {
      background: rgba(34,211,160,.2);
      border-color: rgba(34,211,160,.45);
    }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
    .modal-box { background: var(--surface); padding: 2rem; border-radius: var(--radius-lg); width: 100%; max-width: 400px; }

    @media(max-width:992px){ 
      .detalhe-layout{ grid-template-columns:1fr; } 
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container" style="padding-top:2rem">
    <div id="alert-container"></div>
    
    <div class="detalhe-layout">
      <div class="main-content">
        <div id="mapa-carona" style="height: 380px; border-radius: var(--radius-lg); margin-bottom: 2rem; display: none; border: 1px solid var(--border); z-index: 10;"></div>

        <div id="conteudo">
          <p class="text-muted">Carregando detalhes...</p>
        </div>

        <div id="area-motorista" style="display:none">
          <div class="section-label" style="margin-top:2.5rem">Solicitações na sua carona</div>
          <div id="lista-solicitacoes">
            <p class="text-muted">Carregando...</p>
          </div>
        </div>
      </div>

      <div class="sidebar" id="sidebar-conteudo"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-content">
      <div class="navbar-brand-img" style="margin-bottom: 1rem;"></div>
      <div class="footer-dev">Desenvolvido pelas divas: <a href="#">Ariane Archanjo</a>, <a href="#">Matheus Sizanoski</a>, <a href="#">Pedro Kafka</a> e <a href="#">Rafael Machado</a></div>
      <div class="footer-copyright">© 2026 UniCaronas — Todos os direitos reservados.</div>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/chat-global.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    protegerRota();
    const usuario = getUser();
    const id = new URLSearchParams(location.search).get('id');
    
    if (!id) location.href = 'buscar.html';

    async function carregarDados() {
      try {
        const res = await api.buscarCarona(id);
        const c = res.data;
        const sou_motorista = c.motorista_id === usuario?.id;
        const isLotada = parseInt(c.vagas_disponiveis) <= 0;
        const isMulheres = c.genero_preferencia === 'somente_mulheres';

        if (sou_motorista) {
          document.getElementById('area-motorista').style.display = 'block';
          carregarSolicitacoesMotorista(id);
        }

        if (c.origem && c.destino) setTimeout(() => inicializarMapa(c.origem, c.destino), 100);

        let minhaSol = null;
        if (!sou_motorista) {
          const resSol = await api.minhaSolicitacao(id);
          minhaSol = resSol.data;
        }

        document.getElementById('conteudo').innerHTML = `
          <div class="page-header" style="padding-top:1.5rem">
            <div style="margin-bottom: 1rem;">
              ${isMulheres ? `<span class="badge-mulheres"><i data-lucide="venus"></i> Só Mulheres</span>` : ''}
              ${isLotada ? `<span class="badge-lotada" style="padding: 0.3rem 0.8rem; border-radius: 20px;">Lotada</span>` : ''}
            </div>
            <div class="detalhe-rota fade-up">
              <span>${c.origem}</span>
              <span class="rota-arrow">→</span>
              <span>${c.destino}</span>
            </div>
          </div>
          <div class="card mb-2 fade-up ${isMulheres ? 'carona-mulheres-tema' : ''}">
            <div class="card-title">Detalhes da viagem</div>
            <div class="info-row"><span class="label">Data e hora</span><span class="value">${formatarData(c.horario_partida)}</span></div>
            <div class="info-row"><span class="label">Vagas disponíveis</span><span class="value" style="${isLotada ? 'color: var(--red); font-weight:700;' : ''}">${c.vagas_disponiveis} de ${c.vagas_totais}</span></div>
            <div class="info-row"><span class="label">Ponto de encontro</span><span class="value">${c.ponto_encontro}</span></div>
          </div>
          <div class="card fade-up">
            <div class="card-title">Motorista</div>
            <div class="user-row">
              <div class="avatar avatar-lg">${iniciais(c.motorista_nome)}</div>
              <div>
                <div style="font-size:1.1rem;font-weight:700">${c.motorista_nome}</div>
                <div class="user-rating">${parseFloat(c.motorista_avaliacao||0).toFixed(1)} ★</div>
              </div>
            </div>
          </div>
        `;

        document.getElementById('sidebar-conteudo').innerHTML = `
          <div class="card mb-2 fade-up" style="text-align:center;padding:2.5rem 2rem">
            <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;color:var(--text-3);margin-bottom:.5rem">Valor por passageiro</div>
            <div class="preco-destaque">${formatarMoeda(c.valor_cobrado)}</div>

            ${sou_motorista && c.status === 'ativa' ? `
              <button class="btn btn-success btn-full btn-lg mt-2" onclick="concluirEstaCarona(${c.id})">Encerrar Carona</button>
            ` : ''}

            ${!sou_motorista && !minhaSol && c.status === 'ativa' ? (
              isLotada 
                ? `<button class="btn btn-espera btn-full btn-lg mt-2" onclick="entrarEspera()">Entrar na Lista de Espera</button>`
                : `<button class="btn btn-success btn-full btn-lg mt-2" onclick="solicitar()">Solicitar vaga</button>`
            ) : ''}

            ${!sou_motorista && minhaSol?.status === 'aceita' ? `
              <div class="alert alert-success mt-2" style="margin-bottom: 0.5rem;">Sua vaga está confirmada!</div>
              
              ${minhaSol.pagamento_status === 'pago' ? `
                <div class="alert alert-info mt-1" style="font-size: 0.85rem; color: var(--green); background: rgba(34,211,160,0.1); border-color: rgba(34,211,160,0.2); display: flex; align-items: center; gap: 0.5rem;">
                  <i data-lucide="check-circle" style="width: 16px; height: 16px;"></i> Pagamento confirmado
                </div>
              ` : `
                <div class="alert alert-warning mt-1" style="font-size: 0.85rem; margin-bottom: 1rem;">Pagamento pendente</div>
                <a href="pagamento.html?solicitacao_id=${minhaSol.id}&carona_id=${id}" class="btn btn-primary btn-full mb-2">Efetuar Pagamento</a>
              `}

              <button class="btn-chat-iniciar btn-full mt-2" onclick="abrirChatCarona(${minhaSol.id}, '${c.motorista_nome}', '${c.origem}', '${c.destino}')">
                <i data-lucide="message-square" style="width: 16px; height: 16px;"></i>
                Conversar com o Motorista
              </button>
            ` : ''}

            ${!sou_motorista && minhaSol?.status === 'pendente' ? `
              <div class="alert alert-warning mt-2">Solicitação pendente...</div>
            ` : ''}
          </div>
        `;

        if (typeof lucide !== 'undefined') lucide.createIcons();
      } catch(err) {
        showAlert(err.message, 'error');
      }
    }

    async function entrarEspera() {
      if (!confirm('Deseja entrar na lista de espera?')) return;
      try {
        const res = await api.entrarListaEspera(id);
        showAlert(res.mensagem, 'success');
        carregarDados();
      } catch (err) { showAlert(err.message, 'error'); }
    }

    async function solicitar() {
      try {
        await api.solicitarVaga(id);
        showAlert('Solicitação enviada!', 'success');
        carregarDados();
      } catch(err) { showAlert(err.message, 'error'); }
    }

    async function concluirEstaCarona(caronaId) {
      if (!confirm('Deseja realmente encerrar esta carona?')) return;
      try {
        await api.concluirCarona(caronaId);
        showAlert('Carona encerrada com sucesso!', 'success');
        carregarDados();
      } catch (err) { showAlert(err.message, 'error'); }
    }

    // --- Lógica do Mapa Simplificada ---
    let map = null;
    async function geocode(address) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
        const data = await res.json();
        return data.length > 0 ? [parseFloat(data[0].lat), parseFloat(data[0].lon)] : null;
      } catch (e) { return null; }
    }

    async function inicializarMapa(origem, destino) {
      const cO = await geocode(origem);
      const cD = await geocode(destino);
      if (!cO || !cD) return;
      document.getElementById('mapa-carona').style.display = 'block';
      if (map) map.remove();
      map = L.map('mapa-carona').setView(cO, 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      L.marker(cO).addTo(map).bindPopup('Origem');
      L.marker(cD).addTo(map).bindPopup('Destino');
      const poly = L.polyline([cO, cD], { color: 'var(--accent)' }).addTo(map);
      map.fitBounds(poly.getBounds(), { padding: [50, 50] });
    }

    async function carregarSolicitacoesMotorista(caronaId) {
      const container = document.getElementById('lista-solicitacoes');
      try {
        const res = await api.solicitacoesCarona(caronaId);
        const solicitacoes = res.data;

        if (solicitacoes.length === 0) {
          container.innerHTML = `<p class="text-muted">Nenhuma solicitação recebida ainda.</p>`;
          return;
        }

        container.innerHTML = solicitacoes.map(s => `
          <div class="info-row" style="flex-wrap:wrap; gap:.75rem; border-bottom: 1px solid var(--border); padding: 1rem 0;">
            <div class="user-row">
              <div class="avatar">${iniciais(s.passageiro_nome)}</div>
              <div>
                <div class="user-name">${s.passageiro_nome}</div>
                <div class="user-rating">${s.passageiro_curso || 'Curso não informado'} · ${parseFloat(s.passageiro_avaliacao || 0).toFixed(1)} ★</div>
              </div>
            </div>
            <div style="display:flex; gap:.5rem; align-items:center; margin-left:auto">
              ${s.status === 'pendente' ? `
                <button class="btn btn-success btn-sm" onclick="aceitarSolicitacao(${s.id}, '${s.passageiro_nome}')">Aceitar</button>
                <button class="btn btn-danger btn-sm" onclick="recusarSolicitacao(${s.id})">Recusar</button>
              ` : `
                <span class="badge ${s.status === 'aceita' ? 'badge-green' : 'badge-red'}">${s.status.toUpperCase()}</span>
                ${s.status === 'aceita' ? `
                  <button class="btn-chat-iniciar btn-sm" onclick="abrirChatCarona(${s.id}, '${s.passageiro_nome}')">
                    <i data-lucide="message-square" style="width: 14px; height: 14px;"></i>
                    Chat
                  </button>
                ` : ''}
              `}
            </div>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = `<p class="text-error">${err.message}</p>`;
      }
    }

    function abrirChatCarona(solicitacaoId, nomeOutraPessoa, origem = '', destino = '') {
      let titulo = 'Chat';
      if (origem && destino) {
        titulo = `${origem.split(',')[0]} → ${destino.split(',')[0]}`;
      }
      
      UCChat.iniciarChat(solicitacaoId, {
        titulo,
        outraPessoa: nomeOutraPessoa
      });
    }

    async function aceitarSolicitacao(solId, nome) {
      if (!confirm(`Deseja aceitar a solicitação de ${nome}?`)) return;
      try {
        await api.responderSolicitacao(solId, 'aceita');
        showAlert('Solicitação aceita!', 'success');
        carregarDados();
      } catch (err) { showAlert(err.message, 'error'); }
    }

    async function recusarSolicitacao(solId) {
      if (!confirm('Deseja recusar esta solicitação?')) return;
      try {
        await api.responderSolicitacao(solId, 'recusada');
        showAlert('Solicitação recusada.', 'success');
        carregarDados();
      } catch (err) { showAlert(err.message, 'error'); }
    }

    carregarDados();
  </script>
</body>
</html>
